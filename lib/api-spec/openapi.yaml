openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hotel Guest Check-in API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking management
  - name: guests
    description: Guest check-in operations
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, completed, all]
          required: false
        - in: query
          name: search
          schema:
            type: string
          required: false
        - in: query
          name: page
          schema:
            type: integer
          required: false
        - in: query
          name: limit
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingList"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/stats:
    get:
      operationId: getBookingStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingStats"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a single booking with guests
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
        "404":
          description: Not found
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
    delete:
      operationId: deleteBooking
      tags: [bookings]
      summary: Delete a booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings/{id}/checkin-link:
    get:
      operationId: getCheckinLink
      tags: [bookings]
      summary: Get check-in link for a booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Check-in link info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinLink"
        "404":
          description: Not found

  /checkin/{token}:
    get:
      operationId: getCheckinSession
      tags: [guests]
      summary: Get booking info for guest check-in form (public)
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking info for guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinSession"
        "404":
          description: Invalid or expired token

  /checkin/{token}/guests:
    post:
      operationId: submitGuestCheckin
      tags: [guests]
      summary: Submit guest check-in information
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestCheckinInput"
      responses:
        "201":
          description: Guest check-in submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestRecord"
        "400":
          description: Invalid data
        "404":
          description: Invalid token

  /guests/{id}/upload:
    post:
      operationId: uploadGuestDocument
      tags: [guests]
      summary: Upload ID document or signature for a guest
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUploadInput"
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestRecord"
        "404":
          description: Guest not found

  /bookings/{id}/guests:
    get:
      operationId: listBookingGuests
      tags: [guests]
      summary: List all guests for a booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuestRecord"

  /bookings/{id}/export:
    get:
      operationId: getExportData
      tags: [bookings]
      summary: Export booking guest details (client handles PDF/Excel rendering)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Export data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportData"

  /guests/search:
    get:
      operationId: searchGuests
      tags: [guests]
      summary: Search guests across all bookings
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuestSearchResult"

  /bookings/recent:
    get:
      operationId: listRecentBookings
      tags: [bookings]
      summary: Get recent bookings activity feed
      responses:
        "200":
          description: Recent bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/departures:
    get:
      operationId: listDepartures
      tags: [bookings]
      summary: Get today's check-outs
      responses:
        "200":
          description: Today's departures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/arrivals:
    get:
      operationId: listArrivals
      tags: [bookings]
      summary: Get today's check-ins
      responses:
        "200":
          description: Today's arrivals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/occupancy:
    get:
      operationId: getOccupancy
      tags: [stats]
      summary: Get 14-day occupancy chart data
      responses:
        "200":
          description: Occupancy data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyDay"

  /bookings/bulk-status:
    post:
      operationId: bulkUpdateBookingStatus
      tags: [bookings]
      summary: Bulk update booking status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdateStatus"
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer

  /bookings/bulk-delete:
    post:
      operationId: bulkDeleteBookings
      tags: [bookings]
      summary: Bulk delete bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Deleted count
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer

  /bookings/{id}/duplicate:
    post:
      operationId: duplicateBooking
      tags: [bookings]
      summary: Duplicate a booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Booking:
      type: object
      required: [id, bookingRef, guestName, roomNumber, checkInDate, checkOutDate, numberOfGuests, status, checkinToken, createdAt]
      properties:
        id:
          type: integer
        bookingRef:
          type: string
        guestName:
          type: string
        phone:
          type: ["string", "null"]
        roomNumber:
          type: string
        checkInDate:
          type: string
        checkOutDate:
          type: string
        numberOfGuests:
          type: integer
        status:
          type: string
          enum: [pending, completed]
        checkinToken:
          type: string
        notes:
          type: ["string", "null"]
        guestsSubmitted:
          type: integer
        createdAt:
          type: string

    BookingDetail:
      type: object
      required: [id, bookingRef, guestName, roomNumber, checkInDate, checkOutDate, numberOfGuests, status, checkinToken, createdAt, guests]
      properties:
        id:
          type: integer
        bookingRef:
          type: string
        guestName:
          type: string
        phone:
          type: ["string", "null"]
        roomNumber:
          type: string
        checkInDate:
          type: string
        checkOutDate:
          type: string
        numberOfGuests:
          type: integer
        status:
          type: string
          enum: [pending, completed]
        checkinToken:
          type: string
        notes:
          type: ["string", "null"]
        guestsSubmitted:
          type: integer
        createdAt:
          type: string
        guests:
          type: array
          items:
            $ref: "#/components/schemas/GuestRecord"

    BookingList:
      type: object
      required: [bookings, total]
      properties:
        bookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        total:
          type: integer

    BookingInput:
      type: object
      required: [guestName, roomNumber, checkInDate, checkOutDate, numberOfGuests]
      properties:
        guestName:
          type: string
          minLength: 1
        phone:
          type: string
        roomNumber:
          type: string
          minLength: 1
        checkInDate:
          type: string
        checkOutDate:
          type: string
        numberOfGuests:
          type: integer
          minimum: 1
        notes:
          type: string

    BookingUpdate:
      type: object
      properties:
        guestName:
          type: string
        phone:
          type: string
        roomNumber:
          type: string
        checkInDate:
          type: string
        checkOutDate:
          type: string
        numberOfGuests:
          type: integer
        status:
          type: string
          enum: [pending, completed]
        notes:
          type: string

    CheckinLink:
      type: object
      required: [token, url, whatsappUrl, smsUrl]
      properties:
        token:
          type: string
        url:
          type: string
        whatsappUrl:
          type: string
        smsUrl:
          type: string

    CheckinSession:
      type: object
      required: [bookingId, bookingRef, guestName, roomNumber, checkInDate, checkOutDate, numberOfGuests, guestsSubmitted]
      properties:
        bookingId:
          type: integer
        bookingRef:
          type: string
        guestName:
          type: string
        roomNumber:
          type: string
        checkInDate:
          type: string
        checkOutDate:
          type: string
        numberOfGuests:
          type: integer
        guestsSubmitted:
          type: integer

    GuestRecord:
      type: object
      required: [id, bookingId, fullName, phone, email, address, nationality, idType, isForeignNational, createdAt]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        nationality:
          type: string
        idType:
          type: string
          enum: [aadhaar, passport, driving_licence, voter_id, other]
        idNumber:
          type: ["string", "null"]
        idImageUrl:
          type: ["string", "null"]
        signatureUrl:
          type: ["string", "null"]
        isForeignNational:
          type: boolean
        numberOfGuests:
          type: ["integer", "null"]
        visaNumber:
          type: ["string", "null"]
        visaType:
          type: ["string", "null"]
        visaExpiry:
          type: ["string", "null"]
        portOfEntry:
          type: ["string", "null"]
        arrivalDate:
          type: ["string", "null"]
        passportNumber:
          type: ["string", "null"]
        passportExpiry:
          type: ["string", "null"]
        createdAt:
          type: string

    GuestCheckinInput:
      type: object
      required: [fullName, phone, email, address, nationality, idType]
      properties:
        fullName:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        email:
          type: string
        address:
          type: string
          minLength: 1
        nationality:
          type: string
          minLength: 1
        idType:
          type: string
          enum: [aadhaar, passport, driving_licence, voter_id, other]
        idNumber:
          type: string
        isForeignNational:
          type: boolean
        numberOfGuests:
          type: integer
        visaNumber:
          type: string
        visaType:
          type: string
        visaExpiry:
          type: string
        portOfEntry:
          type: string
        arrivalDate:
          type: string
        passportNumber:
          type: string
        passportExpiry:
          type: string

    DocumentUploadInput:
      type: object
      required: [type, dataUrl, fileName]
      properties:
        type:
          type: string
          enum: [id_document, signature, passport]
        dataUrl:
          type: string
        fileName:
          type: string

    GuestSearchResult:
      type: object
      required: [id, bookingId, bookingRef, fullName, phone, email, nationality, idType, isForeignNational, createdAt]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        bookingRef:
          type: string
        roomNumber:
          type: string
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        nationality:
          type: string
        idType:
          type: string
        isForeignNational:
          type: boolean
        createdAt:
          type: string

    BookingStats:
      type: object
      required: [totalBookings, pendingBookings, completedBookings, todayCheckins, totalGuests, foreignNationals, recentActivity]
      properties:
        totalBookings:
          type: integer
        pendingBookings:
          type: integer
        completedBookings:
          type: integer
        todayCheckins:
          type: integer
        totalGuests:
          type: integer
        foreignNationals:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    ExportData:
      type: object
      required: [booking, guests, generatedAt]
      properties:
        booking:
          $ref: "#/components/schemas/Booking"
        guests:
          type: array
          items:
            $ref: "#/components/schemas/GuestRecord"
        generatedAt:
          type: string

    OccupancyDay:
      type: object
      required: [date, label, occupied, arrivals, departures]
      properties:
        date:
          type: string
        label:
          type: string
        occupied:
          type: integer
        arrivals:
          type: integer
        departures:
          type: integer

    BookingUpdateStatus:
      type: object
      required: [ids, status]
      properties:
        ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [pending, completed]
